<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Trip Packing List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth transitions for color changes */
        .item-box {
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }
        /* Styling for the item being dragged */
        .dragging {
            opacity: 0.5;
            border: 2px dashed #9ca3af !important;
            background-color: #f3f4f6 !important;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <div class="max-w-md mx-auto p-4">
        <header class="text-center my-6">
            <h1 class="text-3xl font-bold text-gray-800 mb-4">🧳 Trip Packing List</h1>
            
            <div class="flex justify-between bg-white rounded-xl p-1 shadow-md">
                <button onclick="switchTab('daddy')" id="tab-daddy" class="flex-1 py-2 px-4 rounded-lg font-semibold text-sm transition-all duration-200 bg-blue-600 text-white">
                    Daddy
                </button>
                <button onclick="switchTab('papa')" id="tab-papa" class="flex-1 py-2 px-4 rounded-lg font-semibold text-sm transition-all duration-200 text-gray-600 hover:bg-gray-200">
                    Papa
                </button>
                <button onclick="switchTab('kayden')" id="tab-kayden" class="flex-1 py-2 px-4 rounded-lg font-semibold text-sm transition-all duration-200 text-gray-600 hover:bg-gray-200">
                    Kayden
                </button>
            </div>
        </header>

        <main>
            <section id="list-daddy" class="tab-content block">
                <h2 class="text-xl font-bold text-gray-700 mb-4 px-1">Daddy's Items</h2>
                <div id="container-daddy" class="space-y-2 container-list"></div>
            </section>

            <section id="list-papa" class="tab-content hidden">
                <h2 class="text-xl font-bold text-gray-700 mb-4 px-1">Papa's Items</h2>
                <div id="container-papa" class="space-y-2 container-list"></div>
            </section>

            <section id="list-kayden" class="tab-content hidden">
                <h2 class="text-xl font-bold text-gray-700 mb-4 px-1">Kayden's Items</h2>
                <div id="container-kayden" class="space-y-2 container-list"></div>
            </section>
        </main>
    </div>

    <script>
        // Data arrays for each person
        const packingData = {
            daddy: [
                "toothbrush", "perfume", "deodorant", "hair cream", "beard cream", 
                "hair brush", "eye drops", "wallet", "passport", "flight ticket", 
                "ID card", "driving license", "laptop", "laptop charger", "adapter", 
                "phone charger", "tablet", "kindle", "downloaded content", "headphones", 
                "mouse", "keyboard", "lactose pills", "daily medicine box", "swim suits",
                "Mounjaro/Wegovy"
            ],
            papa: [
                "Sertraline", "swim suit", "tooth brush", "perfume", "deodorant", 
                "passport", "driving license"
            ],
            kayden: [
                "Inhaler", "swim suit", "blanket", "car seat", "tooth brush", 
                "tooth paste", "Weetabix", "tablet", "downloaded content", "toy", 
                "distraction for plane", "sunscreen", "hat", "rain coat", "crocs or flip flops"
            ]
        };

        // Switch between profile views
        function switchTab(person) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('block'));
            
            document.getElementById(`list-${person}`).classList.remove('hidden');
            document.getElementById(`list-${person}`).classList.add('block');

            ['daddy', 'papa', 'kayden'].forEach(p => {
                const tab = document.getElementById(`tab-${p}`);
                tab.className = "flex-1 py-2 px-4 rounded-lg font-semibold text-sm transition-all duration-200 text-gray-600 hover:bg-gray-200";
            });

            const activeTab = document.getElementById(`tab-${person}`);
            activeTab.className = "flex-1 py-2 px-4 rounded-lg font-semibold text-sm transition-all duration-200 bg-blue-600 text-white";
        }

        // Initialize lists on page load
        function initLists() {
            for (const person in packingData) {
                const container = document.getElementById(`container-${person}`);
                
                // Set up dragover handling for each list container
                container.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    const draggingElement = document.querySelector('.dragging');
                    const afterElement = getDragAfterElement(container, e.clientY);
                    if (afterElement == null) {
                        container.appendChild(draggingElement);
                    } else {
                        container.insertBefore(draggingElement, afterElement);
                    }
                });
                
                packingData[person].forEach((item) => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = "item-box flex items-center justify-between p-4 bg-red-100 border border-red-300 text-red-800 rounded-lg cursor-pointer shadow-sm select-none hover:bg-red-200";
                    itemDiv.dataset.packed = "false";
                    itemDiv.draggable = true;
                    
                    const cleanName = item.charAt(0).toUpperCase() + item.slice(1);

                    itemDiv.innerHTML = `
                        <div class="flex items-center gap-3 pointer-events-none">
                            <span class="text-gray-400 font-bold cursor-grab active:cursor-grabbing">☰</span>
                            <span class="font-medium list-text">${cleanName}</span>
                        </div>
                        <span class="status-icon text-lg pointer-events-none">❌</span>
                    `;

                    // Drag Event Listeners
                    itemDiv.addEventListener('dragstart', () => {
                        itemDiv.classList.add('dragging');
                    });

                    itemDiv.addEventListener('dragend', () => {
                        itemDiv.classList.remove('dragging');
                    });

                    // Avoid triggering click during a drag action
                    let dragStart = false;
                    itemDiv.addEventListener('drag', () => { dragStart = true; });
                    
                    itemDiv.addEventListener('click', (e) => {
                        if (dragStart) {
                            dragStart = false;
                            return;
                        }
                        toggleItem(itemDiv, container);
                    });
                    
                    container.appendChild(itemDiv);
                });
            }
        }

        // Helper function to find the slot where the item is being dropped
        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.item-box:not(.dragging)')];

            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        // Toggle packed state, change colors, and move to bottom if packed
        function toggleItem(element, container) {
            const isPacked = element.dataset.packed === "true";
            const textSpan = element.querySelector('.list-text');
            const iconSpan = element.querySelector('.status-icon');

            if (!isPacked) {
                element.dataset.packed = "true";
                element.className = "item-box flex items-center justify-between p-4 bg-green-100 border border-green-300 text-green-800 rounded-lg cursor-pointer shadow-sm select-none hover:bg-green-200";
                textSpan.classList.add('line-through', 'opacity-60');
                iconSpan.textContent = "✅";
                
                container.appendChild(element);
            } else {
                element.dataset.packed = "false";
                element.className = "item-box flex items-center justify-between p-4 bg-red-100 border border-red-300 text-red-800 rounded-lg cursor-pointer shadow-sm select-none hover:bg-red-200";
                textSpan.classList.remove('line-through', 'opacity-60');
                iconSpan.textContent = "❌";
                
                const firstPacked = container.querySelector('[data-packed="true"]');
                if (firstPacked) {
                    container.insertBefore(element, firstPacked);
                } else {
                    container.appendChild(element);
                }
            }
        }

        initLists();
    </script>
</body>
</html>
